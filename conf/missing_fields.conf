programs:
  defaults_only:
    cmd: "defaults-only"

  partial_defaults:
    cmd: "partial-defaults"
    numprocs: 3
    workingdir: /opt/partial
    autorestart: always
    exitcodes: 0
    stopsignal: HUP
    stdout: /var/tmp/partial.out

  explicit_values:
    cmd: "explicit-values"
    numprocs: 5
    umask: 18
    workingdir: /srv/explicit
    autostart: true
    autorestart: never
    exitcodes:
      - 0
      - 2
    startretries: 4
    starttime: 7
    stopsignal: USR1
    stoptime: 15
    stdout: /var/tmp/explicit.out
    stderr: /var/tmp/explicit.err
    env:
      MODE: test

  stdout_defaults:
    cmd: "stdout-defaults"
    numprocs: 2
    workingdir: /srv/stdout-defaults
    exitcodes:
      - 0
    starttime: 4
    stopsignal: INT
    stoptime: 12

  stderr_defaults:
    cmd: "stderr-defaults"
    umask: 77
    workingdir: /srv/stderr-defaults
    autorestart: unexpected
    exitcodes: 0
    startretries: 2
    starttime: 1
    stopsignal: QUIT
    stoptime: 6
    stdout: /var/tmp/stderr-defaults.out

  mostly_missing:
    cmd: "mostly-missing"
    autostart: true
    exitcodes:
      - 0
      - 3
    env:
      ROLE: worker
