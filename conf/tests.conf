programs:
    k3d:
        cmd: "/usr/local/bin/k3d cluster start home-lab || echo $ANSWER"
        numprocs: 1
        umask: 022
        workingdir: /tmp
        autostart: false
        autorestart: unexpected
        exitcodes:
            - 0
            - 2
        startretries: 3
        starttime: 5
        stopsignal: TERM
        stoptime: 10
        stdout: /tmp/k3d.stdout
        stderr: /tmp/k3d.stderr
        env:
            STARTED_BY: taskmaster
            ANSWER: 42

    nginx:
        cmd: "/usr/sbin/nginx -c /etc/nginx/nginx.conf"
        numprocs: 1
        umask: 077
        workingdir: /tmp
        autostart: true
        autorestart: unexpected
        exitcodes:
            - 0
        startretries: 2
        starttime: 3
        stopsignal: USR1
        stoptime: 10
        stdout: /tmp/nginx.stdout
        stderr: /tmp/nginx.stderr

    sleep:
        cmd: "sleep 300"
        numprocs: 2
        umask: 077
        workingdir: /tmp
        autostart: false
        autorestart: never
        exitcodes:
            - 0
            - 1
        startretries: 0
        starttime: 1
        stopsignal: TERM
        stoptime: 10
        stdout: /tmp/sleep.stdout
        stderr: /tmp/sleep.stderr

    expected_exit:
        cmd: "/bin/sh -c 'sleep 2; exit 2'"
        numprocs: 1
        umask: 022
        workingdir: /tmp
        autostart: false
        autorestart: unexpected
        exitcodes:
            - 0
            - 2
        startretries: 1
        starttime: 1
        stopsignal: TERM
        stoptime: 5
        stdout: /tmp/expected_exit.stdout
        stderr: /tmp/expected_exit.stderr

    unexpected_exit:
        cmd: "/bin/sh -c 'sleep 2; exit 7'"
        numprocs: 1
        umask: 022
        workingdir: /tmp
        autostart: false
        autorestart: unexpected
        exitcodes:
            - 0
        startretries: 2
        starttime: 1
        stopsignal: TERM
        stoptime: 5
        stdout: /tmp/unexpected_exit.stdout
        stderr: /tmp/unexpected_exit.stderr

    always_restart:
        cmd: "/bin/sh -c 'sleep 2; exit 0'"
        numprocs: 1
        umask: 022
        workingdir: /tmp
        autostart: false
        autorestart: always
        exitcodes:
            - 0
        startretries: 1
        starttime: 1
        stopsignal: TERM
        stoptime: 5
        stdout: /tmp/always_restart.stdout
        stderr: /tmp/always_restart.stderr

    backoff_to_fatal:
        cmd: "/bin/false"
        numprocs: 1
        umask: 022
        workingdir: /tmp
        autostart: false
        autorestart: unexpected
        exitcodes:
            - 0
        startretries: 3
        starttime: 3
        stopsignal: TERM
        stoptime: 5
        stdout: /tmp/backoff_to_fatal.stdout
        stderr: /tmp/backoff_to_fatal.stderr

    stop_graceful:
        cmd: "/bin/sh -c 'trap \"exit 0\" TERM; while true; do sleep 1; done'"
        numprocs: 1
        umask: 022
        workingdir: /tmp
        autostart: false
        autorestart: never
        exitcodes:
            - 0
        startretries: 1
        starttime: 1
        stopsignal: TERM
        stoptime: 5
        stdout: /tmp/stop_graceful.stdout
        stderr: /tmp/stop_graceful.stderr

    stop_force_kill:
        cmd: "/bin/sh -c 'trap \"\" TERM; while true; do sleep 1; done'"
        numprocs: 1
        umask: 022
        workingdir: /tmp
        autostart: false
        autorestart: never
        exitcodes:
            - 0
        startretries: 1
        starttime: 1
        stopsignal: TERM
        stoptime: 2
        stdout: /tmp/stop_force_kill.stdout
        stderr: /tmp/stop_force_kill.stderr

    bad_command:
        cmd: "/no/such/binary --test"
        numprocs: 1
        umask: 022
        workingdir: /tmp
        autostart: false
        autorestart: unexpected
        exitcodes:
            - 0
        startretries: 2
        starttime: 1
        stopsignal: TERM
        stoptime: 2
        stdout: /tmp/bad_command.stdout
        stderr: /tmp/bad_command.stderr

    bad_workdir:
        cmd: "/bin/sleep 10"
        numprocs: 1
        umask: 022
        workingdir: /tmp/does-not-exist-taskmaster
        autostart: false
        autorestart: unexpected
        exitcodes:
            - 0
        startretries: 2
        starttime: 1
        stopsignal: TERM
        stoptime: 2
        stdout: /tmp/bad_workdir.stdout
        stderr: /tmp/bad_workdir.stderr