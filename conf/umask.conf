programs:
  umask_permissif:
    cmd: "touch umask_rw-rw-rw-"
    numprocs: 2
    umask: 0000
    workingdir: /tmp
    autostart: true
    autorestart: never
    exitcodes: 
      - 0
      - 1
    startretries: 0
    starttime: 1
    stopsignal: HUP
    stoptime: 10
    stdout: umask_test.stdout
    stderr: umask_test.stderr
